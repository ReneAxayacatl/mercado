<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Origen</title>
</head>
<body>

<h2>Origen</h2>

<a th:href="@{/origen/nuevo}">Nuevo Registro</a>

<br/><br/>

<table border="1">
    <tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Editar</th>
    <th>Eliminar</th>
    </tr>

    <tr th:each="o : ${listaOrigen}" style="text-align: center;">
    <td th:text="${o.idOrigen}"></td>
    <td th:text="${o.nombreOrigen}"></td>

    <td>
        <form th:action="@{/origen/editar}" method="post">
        <input type="hidden" name="id" th:value="${o.idOrigen}" />
        <button type="submit">Editar</button>
        </form>
    </td>

    <td>
        <form th:action="@{/origen/eliminar}" method="post">
        <input type="hidden" name="id" th:value="${o.idOrigen}" />
        <button type="submit">Eliminar</button>
        </form>
    </td>
    </tr>
</table>

<br/>
<a th:href="@{/}">Regresar al menu principal</a>

</body>
</html>
