<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Formulario de Comida</title>
</head>
<body bgcolor="#6c9eab" text="white">

<h2>Formulario de Comida</h2>

<form th:action="@{/comida/guardar}" th:object="${comida}" method="post">

  <!-- ID (oculto) -->
  <input type="hidden" th:field="*{idComida}" />

  <!-- PRODUCTO -->
  <label>Producto:</label>
  <select th:field="*{producto.idProducto}" required>
    <option value="" disabled selected>Seleccione un producto</option>

    <option th:each="p : ${productos}"
            th:value="${p.idProducto}"
            th:text="${p.idProducto}">
    </option>
  </select>

  <br/><br/>

  <!-- ORIGEN (many-to-many) -->
  <label>Origen:</label><br/><br/>
  <div th:each="o : ${origen}">
    <input type="checkbox"
          th:value="${o.idOrigen}"
          th:field="*{origen}" />
    <span th:text="${o.nombre}"></span>
    <br/>
  </div>

  <br/>

  <button type="submit">Guardar</button>
</form>

<br/>
<a th:href="@{/comida}">Regresar a la lista de comidas</a>

</body>
</html>
