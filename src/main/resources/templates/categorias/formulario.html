<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario Categoria</title>
  </head>
  <body bgcolor="#6c9eab" text="white">
    <h2>Formulario Categoria</h2>

    <form
      th:action="@{/categoria/guardar}"
      th:object="${categorias}"
      method="post"
    >
      <input type="hidden" th:field="*{idCategoria}" />

      Nombre de la Categoria

      <input type="text" th:field="*{nombreCategoria}" />

      ¿Caduce? = No Caduce(1) - Caduce(2)

      <select th:field="*{caduce.idCaduce}">
        <option
          th:each="c : ${caduces}"
          th:value="${c.idCaduce}"
          th:text="${c.caduce}"
        ></option>
      </select>

      <button type="submit">Guardar</button>
    </form>
  </body>
</html>
